spring.application.name=cocina360
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=1140000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.leak-detection-threshold=20000

spring.mongodb.uri=${MONGODB_URI}
spring.mongodb.representation.uuid=standard
spring.data.mongodb.auto-index-creation=true

spring.jackson.mapper.accept-case-insensitive-enums=true

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
# show-sql y los logs DEBUG viven en application-dev.properties (perfil dev).

spring.mvc.locale=en
spring.mvc.locale-resolver=accept-header
server.forward-headers-strategy=framework

# Supabase JWT (ES256, asymmetric) — per-request signature verification via the project's JWKS.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI}